name: Build iOS App

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install

      - name: Install Capacitor iOS
        run: npm install @capacitor/ios

      - name: Copy web assets to iOS project
        run: |
          chmod +x ./node_modules/.bin/cap || true
          npx cap copy ios

      - name: Update iOS project
        run: |
          chmod +x ./node_modules/.bin/cap || true
          npx cap update ios

      - name: Build iOS App (Archive)
        run: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -archivePath $PWD/build/App.xcarchive \
            clean archive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Export IPA
        run: |
          cd ios/App
          # Since we are building without signing, we manually package it into a Payload/App.ipa structure.
          mkdir -p Payload
          mv build/App.xcarchive/Products/Applications/App.app Payload/
          zip -r App.ipa Payload

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ElekCalc-iOS-App
          path: ios/App/App.ipa
